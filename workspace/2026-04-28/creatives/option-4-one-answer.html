<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>one answer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.55);
    --ink-faint: rgba(20,20,20,0.30);
    --accent: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 96px;
    box-sizing: border-box;
  }
  .eyebrow {
    font-size: 16px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .before {
    position: absolute;
    left: 96px;
    top: 240px;
    font-size: 32px;
    font-weight: 500;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-decoration: line-through;
    text-decoration-thickness: 3px;
    text-decoration-color: rgba(20,20,20,0.5);
  }
  .before .qualifier {
    display: block;
    font-size: 14px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin-bottom: 14px;
    text-decoration: none;
    -webkit-text-decoration: none;
    font-weight: 500;
  }
  .hero {
    position: absolute;
    left: 80px;
    top: 380px;
    font-size: 220px;
    line-height: 0.9;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -6px;
  }
  .period {
    color: var(--ink);
  }
  .after {
    position: absolute;
    left: 96px;
    top: 800px;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: 0.02em;
    line-height: 1.45;
    max-width: 720px;
  }
  .after .small-caps {
    display: block;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .corner {
    position: absolute;
    right: 96px;
    bottom: 96px;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">procurement &middot; 36-month commit</div>

    <div class="before">
      <span class="qualifier">used to be:</span>
      one answer per cloud
    </div>

    <div class="hero">
      one<br />answer<span class="period">.</span>
    </div>

    <div class="after">
      <span class="small-caps">now</span>
      azure, aws, gcp &mdash; same model.
    </div>

    <div class="corner">
      $50B<br />over 5y
    </div>
  </div>
</body>
</html>
