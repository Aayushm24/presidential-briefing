<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>wall breach</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.55);
    --accent: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 96px;
    box-sizing: border-box;
  }
  .eyebrow {
    font-size: 16px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .wall-wrap {
    position: absolute;
    left: 96px;
    top: 220px;
    width: 888px;
    height: 620px;
  }
  svg { display: block; width: 100%; height: 100%; }
  .label-azure {
    position: absolute;
    left: 78px;
    top: 78px;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .label-anywhere {
    position: absolute;
    left: 380px;
    top: 248px;
    font-size: 36px;
    letter-spacing: 0.04em;
    color: var(--accent);
    font-weight: 700;
  }
  .label-anywhere .arrow {
    display: block;
    font-size: 14px;
    letter-spacing: 0.16em;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .footer {
    position: absolute;
    left: 96px;
    bottom: 96px;
    font-size: 18px;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    line-height: 1.4;
  }
  .footer .red {
    color: var(--ink);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">04.28.2026 &nbsp;&middot;&nbsp; openai &times; everywhere</div>

    <div class="wall-wrap">

        <!-- The breach: jagged hole punched through the middle. Filled with paper, edged in accent. -->
        <path d="
          M 320 180
          L 360 200
          L 350 240
          L 400 230
          L 420 270
          L 470 250
          L 500 290
          L 555 280
          L 580 320
          L 540 360
          L 580 400
          L 530 420
          L 500 460
          L 440 440
          L 410 470
          L 360 450
          L 330 410
          L 290 430
          L 270 380
          L 230 360
          L 250 320
          L 220 290
          L 250 250
          L 280 230
          Z
        " fill="#f4efe6" stroke="#a8301f" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" />

        <!-- A few rubble fragments at the foot of the breach -->
        <g stroke="#141414" stroke-width="2" fill="none" stroke-linecap="round">
          <polyline points="200,560 230,548 260,560" />
          <polyline points="600,560 630,548 660,560 685,556" />
          <polyline points="380,572 410,562 440,572" />
        </g>
      </svg>

      <div class="label-azure">azure</div>

      <div class="label-anywhere">

    <div class="footer">
      <span class="red">$50B over 5 years.</span> &nbsp;the wall came down on monday.

</body>
</html>
