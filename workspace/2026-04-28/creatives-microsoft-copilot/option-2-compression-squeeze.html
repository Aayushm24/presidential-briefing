<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>compression squeeze</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.55);
    --accent: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 96px;
    box-sizing: border-box;
  }
  .eyebrow {
    font-size: 16px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .stage {
    position: absolute;
    left: 0; right: 0;
    top: 180px;
    height: 760px;
  }
  svg { display: block; width: 100%; height: 100%; }
  .footer {
    position: absolute;
    left: 96px;
    bottom: 96px;
    right: 96px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">04.28.2026 &nbsp;&middot;&nbsp; the middle of the stack</div>

    <div class="stage">
      <svg viewBox="0 0 1080 760" xmlns="http://www.w3.org/2000/svg">
        <!-- TOP: Distribution from above -->
        <text x="540" y="60" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="22"
              font-weight="600"
              fill="#141414"
              letter-spacing="3">DISTRIBUTION FROM ABOVE</text>
        <text x="540" y="92" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="14"
              font-weight="500"
              fill="rgba(20,20,20,0.55)"
              letter-spacing="2">word &middot; excel &middot; teams &middot; 20m paid seats</text>

        <!-- Top arrow shaft -->
        <line x1="540" y1="120" x2="540" y2="290" stroke="#141414" stroke-width="3" stroke-linecap="round"/>
        <!-- Top arrow head pointing DOWN -->
        <polygon points="540,310 522,278 558,278" fill="#141414"/>

        <!-- MIDDLE BAND -->
        <rect x="120" y="320" width="840" height="120" fill="none" stroke="#141414" stroke-width="2" stroke-dasharray="6,5"/>

        <text x="540" y="362" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="16"
              font-weight="600"
              fill="rgba(20,20,20,0.55)"
              letter-spacing="3">THE MIDDLE</text>

        <!-- the three crossed-out items -->
        <g font-family="IBM Plex Mono, monospace" font-size="22" font-weight="600" fill="#a8301f" letter-spacing="1.5">
          <text x="240" y="410" text-anchor="start">wrapper</text>
          <text x="540" y="410" text-anchor="middle">orchestration</text>
          <text x="840" y="410" text-anchor="end">thin agent</text>
        </g>
        <!-- strikethrough lines -->
        <line x1="232" y1="402" x2="345" y2="402" stroke="#a8301f" stroke-width="2.5"/>
        <line x1="442" y1="402" x2="640" y2="402" stroke="#a8301f" stroke-width="2.5"/>
        <line x1="730" y1="402" x2="848" y2="402" stroke="#a8301f" stroke-width="2.5"/>

        <!-- Bottom arrow head pointing UP -->
        <polygon points="540,452 522,484 558,484" fill="#141414"/>
        <line x1="540" y1="640" x2="540" y2="484" stroke="#141414" stroke-width="3" stroke-linecap="round"/>

        <!-- BOTTOM: Subsidized intelligence -->
        <text x="540" y="690" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="22"
              font-weight="600"
              fill="#141414"
              letter-spacing="3">SUBSIDIZED INTELLIGENCE FROM BELOW</text>
        <text x="540" y="722" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="14"
              font-weight="500"
              fill="rgba(20,20,20,0.55)"
              letter-spacing="2">frontier models &middot; royalty-free &middot; through 2032</text>
      </svg>
    </div>

    <div class="footer">
      <div>compression &middot; both sides</div>
      <div>microsoft &middot; copilot</div>
    </div>
  </div>
</body>
</html>
