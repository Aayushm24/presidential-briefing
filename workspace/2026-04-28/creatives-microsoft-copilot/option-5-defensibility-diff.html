<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>defensibility diff</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.55);
    --accent: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 96px;
    box-sizing: border-box;
  }
  .eyebrow {
    font-size: 16px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .headline {
    margin-top: 36px;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--ink);
    max-width: 720px;
  }
  .headline .em { color: var(--ink-soft); }
  .columns {
    position: absolute;
    left: 96px;
    right: 96px;
    top: 320px;
    display: flex;
    gap: 60px;
  }
  .col {
    flex: 1;
  }
  .col-header {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    padding-bottom: 14px;
    border-bottom: 1.5px solid var(--ink);
    margin-bottom: 24px;
  }
  .item {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--ink);
    padding: 14px 0;
    border-bottom: 1px dashed rgba(20,20,20,0.20);
    letter-spacing: -0.01em;
  }
  .item.dead {
    color: rgba(20,20,20,0.40);
    text-decoration: line-through;
    text-decoration-thickness: 2px;
  }
  .col.alive .item {
    color: var(--ink);
  }
  .closer {
    position: absolute;
    left: 96px;
    right: 96px;
    bottom: 96px;
    border-top: 2px solid var(--ink);
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .closer .q {
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .closer .q .accent {
    color: var(--accent);
    font-weight: 700;
  }
  .closer .meta {
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: right;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">04.28.2026 &nbsp;&middot;&nbsp; what microsoft can absorb</div>

    <div class="headline">
      <span class="em">when frontier models cost zero,</span><br/>
      the moat moves.
    </div>

    <div class="columns">
      <div class="col dead">
        <div class="col-header">compressed</div>
        <div class="item dead">better latency</div>
        <div class="item dead">better routing</div>
        <div class="item dead">better reasoning</div>
      </div>

      <div class="col alive">
        <div class="col-header">still defensible</div>
        <div class="item">proprietary data loops</div>
        <div class="item">regulated workflow depth</div>
        <div class="item">vertical context</div>
      </div>
    </div>

    <div class="closer">
      <div class="q">
        your one bet microsoft <span class="accent">can't absorb</span> in 18 months?
      </div>
      <div class="meta">
        04.28.2026
      </div>
    </div>
  </div>
</body>
</html>
