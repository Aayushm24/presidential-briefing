<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>2032 horizon</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.55);
    --accent: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 96px;
    box-sizing: border-box;
  }
  .eyebrow {
    font-size: 16px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .headline {
    margin-top: 48px;
    font-size: 56px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    max-width: 800px;
  }
  .headline .em {
    color: var(--accent);
  }
  .stage {
    position: absolute;
    left: 0; right: 0;
    top: 460px;
    height: 360px;
  }
  svg { display: block; width: 100%; height: 100%; }
  .footer {
    position: absolute;
    left: 96px;
    bottom: 96px;
    right: 96px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-top: 1px solid rgba(20,20,20,0.18);
    padding-top: 18px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">04.28.2026 &nbsp;&middot;&nbsp; the long horizon</div>

    <div class="headline">
      royalty-free<br/>frontier models<br/>through <span class="em">2032</span>.
    </div>

    <div class="stage">
      <svg viewBox="0 0 1080 360" xmlns="http://www.w3.org/2000/svg">
        <!-- year labels -->
        <text x="96" y="60" text-anchor="start"
              font-family="IBM Plex Mono, monospace"
              font-size="16"
              font-weight="600"
              fill="rgba(20,20,20,0.55)"
              letter-spacing="3">2026</text>
        <text x="984" y="60" text-anchor="end"
              font-family="IBM Plex Mono, monospace"
              font-size="16"
              font-weight="600"
              fill="#a8301f"
              letter-spacing="3">2032</text>

        <!-- main horizon bar - empty rectangle -->
        <rect x="96" y="100" width="888" height="80" fill="none" stroke="#141414" stroke-width="2"/>

        <!-- accent fill - the royalty-free window stretches the full bar -->
        <rect x="96" y="100" width="888" height="80" fill="#a8301f" opacity="0.12"/>

        <!-- diagonal hash pattern strokes inside the bar -->
        <g stroke="#a8301f" stroke-width="1.5" opacity="0.6">
          <line x1="120" y1="180" x2="160" y2="100"/>
          <line x1="180" y1="180" x2="220" y2="100"/>
          <line x1="240" y1="180" x2="280" y2="100"/>
          <line x1="300" y1="180" x2="340" y2="100"/>
          <line x1="360" y1="180" x2="400" y2="100"/>
          <line x1="420" y1="180" x2="460" y2="100"/>
          <line x1="480" y1="180" x2="520" y2="100"/>
          <line x1="540" y1="180" x2="580" y2="100"/>
          <line x1="600" y1="180" x2="640" y2="100"/>
          <line x1="660" y1="180" x2="700" y2="100"/>
          <line x1="720" y1="180" x2="760" y2="100"/>
          <line x1="780" y1="180" x2="820" y2="100"/>
          <line x1="840" y1="180" x2="880" y2="100"/>
          <line x1="900" y1="180" x2="940" y2="100"/>
        </g>

        <!-- label inside/centered -->
        <text x="540" y="148" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="20"
              font-weight="700"
              fill="#141414"
              letter-spacing="3">$0 MODEL COST</text>

        <!-- 6 YEARS callout under bar -->
        <text x="540" y="216" text-anchor="middle"
              font-family="IBM Plex Mono, monospace"
              font-size="14"
              font-weight="500"
              fill="rgba(20,20,20,0.55)"
              letter-spacing="3">6 YEARS</text>

        <!-- shipped via row -->
        <text x="96" y="290" text-anchor="start"
              font-family="IBM Plex Mono, monospace"
              font-size="14"
              font-weight="500"
              fill="rgba(20,20,20,0.55)"
              letter-spacing="3">SHIPPED VIA</text>

        <g font-family="IBM Plex Mono, monospace" font-size="22" font-weight="600" fill="#141414" letter-spacing="2">
          <text x="96" y="330" text-anchor="start">word</text>
          <text x="540" y="330" text-anchor="middle">excel</text>
          <text x="984" y="330" text-anchor="end">teams</text>
        </g>
      </svg>
    </div>

    <div class="footer">
      <div>microsoft &middot; copilot &middot; 20m paid seats</div>
      <div>"exploit it"</div>
    </div>
  </div>
</body>
</html>
