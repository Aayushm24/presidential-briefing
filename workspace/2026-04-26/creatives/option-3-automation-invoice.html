<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>automation invoice</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --receipt: #fbf8f1;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.6);
    --stamp: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 56px;
    position: relative;
  }
  .receipt {
    width: 560px;
    background: var(--receipt);
    padding: 44px 44px 0 44px;
    color: var(--ink);
    box-shadow: 0 6px 24px rgba(20,20,20,0.08), 0 1px 2px rgba(20,20,20,0.06);
    position: relative;
  }
  .receipt::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -22px;
    height: 24px;
    background: var(--receipt);
    clip-path: polygon(
      0 0, 5% 90%, 10% 30%, 15% 100%, 20% 40%, 25% 95%,
      30% 25%, 35% 90%, 40% 40%, 45% 100%, 50% 20%, 55% 90%,
      60% 40%, 65% 100%, 70% 30%, 75% 95%, 80% 25%, 85% 90%,
      90% 35%, 95% 100%, 100% 40%, 100% 0
    );
  }
  .head {
    font-size: 14px;
    letter-spacing: 0.10em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .rule { border: none; border-top: 1px dashed rgba(0,0,0,0.3); margin: 18px 0; }
  .title {
    font-size: 22px;
    font-weight: 600;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .line {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    margin: 14px 0;
  }
  .line.struck {
    color: rgba(20,20,20,0.45);
    text-decoration: line-through;
    text-decoration-thickness: 2px;
  }
  .line.kept {
    color: var(--stamp);
    font-weight: 600;
  }
  .stamp-wrap { position: relative; height: 130px; }
  .stamp {
    position: absolute; left: 70px; top: 14px;
    transform: rotate(-9deg);
    border: 4px solid var(--stamp);
    color: var(--stamp);
    padding: 8px 22px;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.16em;
    opacity: 0.92;
    box-shadow: inset 0 0 0 1px rgba(168,48,31,0.2);
  }
  .total {
    display: flex;
    justify-content: space-between;
    font-size: 22px;
    font-weight: 600;
    margin-top: 6px;
  }
  .footer {
    font-size: 18px;
    color: rgba(20,20,20,0.62);
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="receipt">
      <div class="head">automation estimate &middot; 04.26.2026</div>
      <hr class="rule" />
      <div class="line struck"><span>ai automation</span><span>80%</span></div>
      <div class="line kept"><span>human handoff</span><span>20%</span></div>
      <div class="stamp-wrap">
        <div class="stamp">REVISED</div>
      </div>
      <hr class="rule" />
      <div class="total"><span>SHIPS</span><span>YES</span></div>
      <div style="height: 24px"></div>
    </div>
    <div class="footer">the interface is the product.</div>
  </div>
</body>
</html>
