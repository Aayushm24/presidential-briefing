<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>the gap</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --ink: #141414;
    --ink-soft: rgba(20,20,20,0.55);
    --accent: #a8301f;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--ink);
  }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 96px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .eyebrow {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .word {
    font-family: 'Inter', sans-serif;
    font-size: 280px;
    font-weight: 900;
    letter-spacing: -0.05em;
    line-height: 0.92;
    color: var(--ink);
  }
  .word.accent { color: var(--accent); }

  .seam {
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .seam svg { display: block; width: 100%; height: 60px; }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    color: var(--ink-soft);
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="row">
      <span class="label">peaks</span>
      <span class="word">codes</span>
    </div>

    <div class="seam">
      <svg viewBox="0 0 888 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polyline
          fill="none"
          stroke="#141414"
          stroke-width="3"
          stroke-linecap="square"
          stroke-linejoin="miter"
          points="0,30 40,10 80,42 120,8 160,38 200,12 240,40 280,14 320,36 360,10 400,44 440,12 480,38 520,8 560,42 600,14 640,36 680,10 720,42 760,12 800,38 840,8 888,40"
        />
      </svg>
    </div>

    <div class="row">
      <span class="label" style="color: rgba(168,48,31,0.7);">valleys</span>
      <span class="word accent">counts</span>
    </div>

    <div class="footer">
      <span>the 20% nobody pitches</span>
    </div>
  </div>
</body>
</html>
