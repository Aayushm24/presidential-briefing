<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>option-3-the-countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface:   #fafaf9;
    --card:      #ffffff;
    --hero:      #dc2626;
    --hero-soft: #fecaca;
    --accent:    #f59e0b;
    --ink:       #0a0a0a;
    --ink-dim:   #52525b;
    --border:    #e4e4e7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 1200px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings: 'ss01' on, 'cv11' on;
    background: var(--surface);
    color: var(--ink);
    padding: 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .content-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    flex: 1;
    padding-top: 20px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--hero);
    background: var(--hero-soft);
    padding: 10px 18px;
    border-radius: 9999px;
  }
  .chip-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--hero);
    animation: none;
  }
  .quote-mark {
    font-size: 140px;
    font-weight: 900;
    color: var(--hero);
    line-height: 0.7;
    margin-top: 24px;
    margin-bottom: -12px;
    letter-spacing: -0.05em;
  }
  .quote {
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.02;
    color: var(--ink);
    max-width: 1020px;
    margin-top: 8px;
  }
  .spacer-bottom {
    flex: 0 0 auto;
  }
  .quote .hit {
    color: var(--hero);
  }
  .quote .ellipsis {
    color: var(--hero);
    font-weight: 900;
  }
  .rule {
    width: 88px;
    height: 6px;
    background: var(--accent);
    margin-top: 48px;
    border-radius: 999px;
  }
  .byline {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-dim);
    margin-top: 22px;
    letter-spacing: 0.01em;
  }
  .byline span.name { color: var(--ink); font-weight: 700; }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    color: var(--ink-dim);
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }
  .footer-handle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    color: var(--ink);
  }
  .li-icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
  <div class="content-wrap">
    <span class="chip"><span class="chip-dot"></span>pull quote · 2026-04-20</span>
    <div class="quote-mark">"</div>
    <h1 class="quote">AI startups have <span class="hit">12 months</span> before they die<span class="ellipsis">…</span></h1>
    <div class="rule"></div>
    <p class="byline"><span class="name">aayush</span> — every week I watch a category shrink.</p>
  </div>
  <div class="footer">
    <span class="footer-handle">
      <svg class="li-icon" width="20" height="20" viewBox="0 0 24 24" fill="#0a66c2" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span>aayush-maheshwari</span>
    </span>
    <span>2026-04-20</span>
  </div>
</body>
</html>
