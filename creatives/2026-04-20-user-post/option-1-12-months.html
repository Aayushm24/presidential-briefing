<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>option-1-12-months</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface:   #fafaf9;
    --card:      #ffffff;
    --hero:      #dc2626;
    --hero-soft: #fecaca;
    --accent:    #f59e0b;
    --ink:       #0a0a0a;
    --ink-dim:   #52525b;
    --border:    #e4e4e7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 1200px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings: 'ss01' on, 'cv11' on;
    background: var(--surface);
    color: var(--ink);
    padding: 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--hero);
    background: var(--hero-soft);
    padding: 10px 16px;
    border-radius: 9999px;
  }
  .chip-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--hero);
    box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.18);
  }
  .hero-row {
    margin-top: 40px;
    display: flex;
    align-items: flex-end;
    gap: 40px;
  }
  .hero-num {
    font-size: 420px;
    font-weight: 900;
    letter-spacing: -0.07em;
    line-height: 0.82;
    color: var(--hero);
  }
  .hero-label {
    padding-bottom: 34px;
  }
  .hero-label .months {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: var(--ink);
    text-transform: uppercase;
  }
  .hero-label .sub {
    font-size: 24px;
    font-weight: 500;
    color: var(--ink-dim);
    margin-top: 14px;
    letter-spacing: 0.02em;
  }
  .claim {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.08;
    color: var(--ink);
    max-width: 940px;
    margin-top: 56px;
  }
  .claim em {
    font-style: normal;
    color: var(--hero);
    border-bottom: 6px solid var(--accent);
    padding-bottom: 2px;
  }
  .caption {
    font-size: 22px;
    font-weight: 500;
    color: var(--ink-dim);
    line-height: 1.5;
    max-width: 880px;
    margin-top: 28px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    color: var(--ink-dim);
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }
  .footer-handle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    color: var(--ink);
  }
  .li-icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
  <div>
    <span class="chip"><span class="chip-dot"></span>countdown</span>
    <div class="hero-row">
      <div class="hero-num">12</div>
      <div class="hero-label">
        <div class="months">Months</div>
        <div class="sub">before they die…</div>
      </div>
    </div>
    <h1 class="claim">Most AI startups are <em>building the exact thing</em> OpenAI will ship next quarter.</h1>
    <p class="caption">Small team ships a clever AI wrapper. Six months later, a platform ships it natively. The startup pivots or dies quietly.</p>
  </div>
  <div class="footer">
    <span class="footer-handle">
      <svg class="li-icon" width="20" height="20" viewBox="0 0 24 24" fill="#0a66c2" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span>aayush-maheshwari</span>
    </span>
    <span>2026-04-20</span>
  </div>
</body>
</html>
