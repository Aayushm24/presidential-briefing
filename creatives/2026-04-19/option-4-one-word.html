<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f9fb; --ink: #0a0b0c; --ink-dim: #52525b;
    --accent: #0f172a; --border: #e4e4e7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 1200px; }
  body {
    font-family: 'Inter', sans-serif;
    font-feature-settings: 'ss01' on, 'cv11' on;
    background: var(--bg); color: var(--ink);
    padding: 96px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top {
    display: flex; flex-direction: column; gap: 18px;
  }
  .chip {
    display: inline-block; width: fit-content; font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); background: #fff;
    border: 1px solid var(--border); padding: 8px 16px; border-radius: 9999px;
  }
  .prelude { font-size: 22px; font-weight: 500; color: var(--ink-dim); line-height: 1.4; max-width: 820px; }
  .word {
    font-size: 186px; font-weight: 900; letter-spacing: -0.055em;
    color: var(--accent); line-height: 0.9;
    padding-top: 60px;
  }
  .bottom {
    display: flex; flex-direction: column; gap: 28px;
  }
  .punchline {
    font-size: 30px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.25;
    max-width: 850px;
  }
  .footer {
    display: flex; justify-content: space-between; font-size: 14px; color: var(--ink-dim);
    border-top: 1px solid var(--border); padding-top: 22px;
  }
  .footer strong { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
  <div class="top">
    <span class="chip">Apr 19 · one word</span>
    <p class="prelude">Cerebras IPO. Tesla robotaxis. Same week. A thesis in a single word:</p>
    <h1 class="word">commodity.</h1>
  </div>
  <div class="bottom">
    <p class="punchline">AI is not your competitive advantage anymore. The moat moved. <strong>It lives in memory, context, and the application layer.</strong></p>
    <div class="footer">
      <span><strong>@aayush-maheshwari</strong> · presidential briefing</span>
      <span>2026-04-19</span>
    </div>
  </div>
</body>
</html>
