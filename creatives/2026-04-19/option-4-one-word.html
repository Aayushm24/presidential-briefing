<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #fafaf9;
    --card: #ffffff;
    --hero: #6d28d9;
    --hero-soft: #e9d5ff;
    --accent: #f472b6;
    --ink: #0a0a0a;
    --ink-dim: #52525b;
    --border: #e4e4e7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 1200px; }
  body {
    font-family: 'Inter', sans-serif;
    font-feature-settings: 'ss01' on, 'cv11' on;
    background: var(--surface); color: var(--ink);
    padding: 96px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top {
    display: flex; flex-direction: column; gap: 18px;
  }
  .chip {
    display: inline-block; width: fit-content; font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff; background: var(--accent);
    padding: 8px 16px; border-radius: 9999px;
  }
  .prelude { font-size: 22px; font-weight: 500; color: var(--ink-dim); line-height: 1.4; max-width: 820px; }
  .word {
    font-size: 186px; font-weight: 900; letter-spacing: -0.055em;
    color: var(--hero); line-height: 0.9;
    padding-top: 60px;
    position: relative;
    display: inline-block;
  }
  .word::after {
    content: ""; position: absolute;
    left: 0; right: 10%; bottom: 12px; height: 14px;
    background: var(--accent); opacity: 0.75;
    z-index: -1;
  }
  .bottom {
    display: flex; flex-direction: column; gap: 28px;
  }
  .punchline {
    font-size: 30px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.25;
    max-width: 850px;
  }
  .punchline strong { color: var(--hero); font-weight: 800; }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; color: var(--ink-dim);
    border-top: 1px solid var(--border); padding-top: 22px;
  }
  .handle { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: var(--ink); }
  .li-icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
  <div class="top">
    <span class="chip">Apr 19 · one word</span>
    <p class="prelude">Cerebras IPO. Tesla robotaxis. Same week. A thesis in a single word:</p>
    <h1 class="word">commodity.</h1>
  </div>
  <div class="bottom">
    <p class="punchline">AI is not your competitive advantage anymore. The moat moved. <strong>It lives in memory, context, and the application layer.</strong></p>
    <div class="footer">
      <span class="handle">
        <svg class="li-icon" width="20" height="20" viewBox="0 0 24 24" fill="#0a66c2" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        aayush-maheshwari
      </span>
      <span>2026-04-19</span>
    </div>
  </div>
</body>
</html>
