name: Weekly Feedback

on:
  schedule:
    # 7:00 AM IST Sunday = 01:30 UTC Sunday. Runs after Sunday's daily-brief.
    - cron: '30 1 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview candidates without Slack/commit side effects'
        type: boolean
        default: false
      today_override:
        description: 'Override Sunday date (YYYY-MM-DD) — useful for replays'
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: weekly-feedback
  cancel-in-progress: false

jobs:
  synthesize:
    name: Synthesize conviction candidates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Kolkata
      LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
      GITHUB_REPO: Aayushm24/presidential-briefing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "presidential-briefing-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Set TODAY
        id: today
        run: |
          if [ -n "${{ github.event.inputs.today_override }}" ]; then
            echo "today=${{ github.event.inputs.today_override }}" >> $GITHUB_OUTPUT
          else
            echo "today=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl python3

      - name: Run weekly-feedback via Claude Code
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          prompt: |
            Run .claude/skills/weekly-feedback/SKILL.md.

            TODAY=${{ steps.today.outputs.today }}

            Inputs already on disk (read-only):
              - config/conviction.md
              - config/aayush-linkedin-patterns.md
              - history/option-pickups.jsonl
              - history/published.jsonl
              - performance-data/post-*.md
              - workspace/YYYY-MM-DD/{posts.json,brief.md} for last 7 days

            Output: workspace/${{ steps.today.outputs.today }}/conviction-candidates.md
                    workspace/${{ steps.today.outputs.today }}/.status = candidates-ready

            Do NOT edit config/conviction.md. Do NOT commit. Do NOT Slack.
            Deterministic bash handles those in the next step.
          settings: .claude/settings.json
          anthropic_api_key: ${{ secrets.ATLAN_LLM_KEY }}
          claude_args: "--max-turns 30 --dangerously-skip-permissions"
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ATLAN_LLM_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          ANTHROPIC_MODEL: claude-opus-4-6
          ANTHROPIC_SMALL_FAST_MODEL: claude-sonnet-4-6
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
          TODAY: ${{ steps.today.outputs.today }}

      - name: Deliver (commit + Slack)
        if: github.event.inputs.dry_run != 'true'
        env:
          DATE: ${{ steps.today.outputs.today }}
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          GITHUB_REPO: Aayushm24/presidential-briefing
        run: |
          set -euo pipefail
          WS="workspace/${DATE}"
          CANDIDATES="${WS}/conviction-candidates.md"

          if [ ! -f "$CANDIDATES" ]; then
            echo "::error::missing $CANDIDATES — skill did not produce output"
            exit 1
          fi

          # --- Commit ---
          git add "${WS}/conviction-candidates.md" "${WS}/.status" 2>/dev/null || true
          git commit -m "weekly-feedback: conviction candidates for ${DATE}" || echo "nothing to commit"
          git pull --rebase origin main
          git push origin HEAD:main

          # --- Slack via n8n ---
          CANDIDATES_URL="https://github.com/${GITHUB_REPO}/blob/main/${CANDIDATES}"
          CONVICTION_URL="https://github.com/${GITHUB_REPO}/blob/main/config/conviction.md"
          PAYLOAD=$(jq -n \
            --arg date "$DATE" \
            --arg candidates_url "$CANDIDATES_URL" \
            --arg conviction_url "$CONVICTION_URL" \
            '{
              type: "weekly_feedback",
              date: $date,
              candidates_url: $candidates_url,
              conviction_url: $conviction_url,
              message: "Sunday review: conviction candidates ready. Edit conviction.md if you want to apply any."
            }')

          HTTP=$(curl -sS -o /tmp/slack-resp.txt -w "%{http_code}" \
            -X POST "${N8N_SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "n8n webhook HTTP $HTTP"
          cat /tmp/slack-resp.txt
          [ "$HTTP" == "200" ] || echo "::warning::n8n webhook returned $HTTP (non-fatal)"

      - name: Path allowlist enforcement (live runs only)
        if: github.event.inputs.dry_run != 'true'
        run: |
          DIFF_FILES=$(git log --name-only -1 --format= HEAD 2>/dev/null || true)
          FAILED=0
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            case "$FILE" in
              workspace/*) ;;
              history/*) ;;
              *)
                echo "::error::Path allowlist violation: $FILE"
                FAILED=1
                ;;
            esac
          done <<< "$DIFF_FILES"
          if [ $FAILED -eq 1 ]; then
            echo "::error::Unauthorized paths in last commit"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-feedback-${{ steps.today.outputs.today }}
          path: workspace/${{ steps.today.outputs.today }}/
          retention-days: 30
