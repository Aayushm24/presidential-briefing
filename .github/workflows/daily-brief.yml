name: Daily Brief

on:
  schedule:
    # 5:30 AM IST = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without Slack/Gmail/commit side effects'
        type: boolean
        default: false
      today_override:
        description: 'Override date (YYYY-MM-DD). Useful for replays.'
        type: string
        required: false

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-brief-${{ github.event.inputs.today_override || github.run_id }}
  cancel-in-progress: false

# 5-job pipeline — each step on its own runner with its own timeout budget.
#
#   scan        → bash: RSS + Grok + merge               (~3 min)
#   analyze     → Sonnet: score + theme + brain          (~12 min)
#   write-brief → Opus 4.7: brief only                   (~8 min)
#   write-posts → Opus 4.7: posts (reads brief.md)       (~6 min, after write-brief)
#   ship        → Gemini judges, Opus revises, bash gates (~12 min)
#
# Model split: Opus writes, Gemini judges (different model family = no circular bias).
# write-posts is sequential after write-brief so posts draw from the synthesized brief.

jobs:
  # ============================================================
  # JOB 1: SCAN — deterministic bash only. No Claude Code.
  # Fails fast and cheap if feeds are broken.
  # ============================================================
  scan:
    name: Scan (RSS + Grok)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    outputs:
      today: ${{ steps.today.outputs.today }}
      dry_run: ${{ steps.dry.outputs.dry_run }}

    env:
      LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
      GITHUB_REPO: Aayushm24/presidential-briefing
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set TODAY
        id: today
        run: |
          if [ -n "${{ github.event.inputs.today_override }}" ]; then
            echo "today=${{ github.event.inputs.today_override }}" >> $GITHUB_OUTPUT
          else
            echo "today=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Set DRY_RUN
        id: dry
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "dry_run=1" >> $GITHUB_OUTPUT
          else
            echo "dry_run=0" >> $GITHUB_OUTPUT
          fi

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl python3 python3-pip
          python3 -m pip install --break-system-packages --quiet feedparser requests markdown
          python3 -c "import feedparser, requests, markdown; print('deps ok')"

      - name: Scan (RSS + Grok)
        env:
          TODAY: ${{ steps.today.outputs.today }}
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
        run: ./scripts/scan.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workspace-${{ steps.today.outputs.today }}
          path: workspace/${{ steps.today.outputs.today }}/
          retention-days: 14

  # ============================================================
  # JOB 2: ANALYZE — score + theme-detect + brain-connect
  # Claude Code call. Runs only if scan succeeded.
  # ============================================================
  analyze:
    name: Analyze (score + theme + brain)
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      quiet_day: ${{ steps.classify.outputs.quiet_day }}
      degraded: ${{ steps.classify.outputs.degraded }}

    env:
      LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
      SUPABASE_URL: https://xbatqlzrtijdmicoakaq.supabase.co
      GITHUB_REPO: Aayushm24/presidential-briefing
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: sudo apt-get install -y -qq jq curl python3

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: workspace-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/

      - name: Run score + theme + brain via Claude Code
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          prompt: |
            workspace/${{ needs.scan.outputs.today }}/raw-intake.json is ready.
            Run these skills in order:
              1. .claude/skills/score/SKILL.md          → scored.json + research.md
              2. .claude/skills/theme-detect/SKILL.md   → themes.json
              3. .claude/skills/brain-connect/SKILL.md  → brain.md + Supabase upserts

            TODAY=${{ needs.scan.outputs.today }}
            DRY_RUN=${{ needs.scan.outputs.dry_run }}

            Write all outputs under workspace/${{ needs.scan.outputs.today }}/.
            If raw-intake.json has <3 items, write quiet_day=true to scored.json and exit cleanly.
            Do NOT proceed to write-briefing/write-posts — those run in separate parallel jobs.
          settings: .claude/settings.json
          anthropic_api_key: ${{ secrets.ATLAN_LLM_KEY }}
          max_turns: 40
          timeout_minutes: 13
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ATLAN_LLM_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ANTHROPIC_SMALL_FAST_MODEL: claude-sonnet-4-6
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
          SUPABASE_URL: https://xbatqlzrtijdmicoakaq.supabase.co
          TODAY: ${{ needs.scan.outputs.today }}
          DRY_RUN: ${{ needs.scan.outputs.dry_run }}

      - name: Classify day (quiet vs normal vs degraded)
        id: classify
        run: |
          TODAY=${{ needs.scan.outputs.today }}
          WS="workspace/${TODAY}"
          QUIET="false"
          DEGRADED="false"

          if [ ! -f "${WS}/scored.json" ]; then
            echo "no scored.json → quiet"
            QUIET="true"
          elif [ "$(jq -r '.quiet_day // false' ${WS}/scored.json)" = "true" ]; then
            QUIET="true"
          elif [ "$(jq '(.top_10 // []) | length' ${WS}/scored.json)" -lt 3 ]; then
            QUIET="true"
          fi

          if [ -f "${WS}/.status" ] && [ "$(cat ${WS}/.status)" = "scan-degraded" ]; then
            DEGRADED="true"
          fi

          echo "quiet_day=$QUIET" >> $GITHUB_OUTPUT
          echo "degraded=$DEGRADED" >> $GITHUB_OUTPUT
          echo "classified: quiet_day=$QUIET degraded=$DEGRADED"

      - name: Alarm on scan degradation
        if: steps.classify.outputs.degraded == 'true' && needs.scan.outputs.dry_run == '0'
        env:
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          DATE: ${{ needs.scan.outputs.today }}
        run: |
          WS="workspace/${DATE}"
          REASONS=$(jq -c '.degraded_reasons' "${WS}/scan-summary.json" 2>/dev/null || echo '[]')
          RSS_OK=$(jq -r '.rss.feeds_processed' "${WS}/scan-summary.json" 2>/dev/null || echo "?")
          RSS_TOTAL=$(jq -r '.rss.feeds_total' "${WS}/scan-summary.json" 2>/dev/null || echo "?")
          PAYLOAD=$(jq -n \
            --arg date "$DATE" \
            --arg rss "${RSS_OK}/${RSS_TOTAL} feeds ok" \
            --argjson reasons "$REASONS" \
            '{type:"scan_degraded",date:$date,message:"Scan degraded — brief will still ship",rss_summary:$rss,reasons:$reasons}')
          curl -sS -X POST "$N8N_SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workspace-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
          retention-days: 14
          overwrite: true

  # ============================================================
  # JOB 3: WRITE-BRIEF — briefing only. Parallel with write-posts.
  # ============================================================
  write-brief:
    name: Write brief
    needs: [scan, analyze]
    if: needs.analyze.outputs.quiet_day != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
      GITHUB_REPO: Aayushm24/presidential-briefing
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: sudo apt-get install -y -qq jq curl python3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/

      - name: Write briefing via Claude Code
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          prompt: |
            Write the daily briefing. Inputs are in workspace/${{ needs.scan.outputs.today }}/.
            Follow .claude/skills/write-briefing/SKILL.md → produces brief.md

            TODAY=${{ needs.scan.outputs.today }}
            DRY_RUN=${{ needs.scan.outputs.dry_run }}

            Use research.md, brain.md, themes.json, scored.json as source material.
            Do NOT write posts — that runs in a parallel job.
            Do NOT run council or publish.
          settings: .claude/settings.json
          anthropic_api_key: ${{ secrets.ATLAN_LLM_KEY }}
          max_turns: 30
          timeout_minutes: 10
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ATLAN_LLM_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          ANTHROPIC_MODEL: claude-opus-4-7
          ANTHROPIC_SMALL_FAST_MODEL: claude-sonnet-4-6
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
          TODAY: ${{ needs.scan.outputs.today }}
          DRY_RUN: ${{ needs.scan.outputs.dry_run }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workspace-brief-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
          retention-days: 14

  # ============================================================
  # JOB 4: WRITE-POSTS — 3 LinkedIn options. Parallel with write-brief.
  # ============================================================
  write-posts:
    name: Write posts
    needs: [scan, analyze, write-brief]
    if: needs.analyze.outputs.quiet_day != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
      GITHUB_REPO: Aayushm24/presidential-briefing
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: sudo apt-get install -y -qq jq curl python3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/

      - name: Download brief artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace-brief-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/

      - name: Write posts via Claude Code
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          prompt: |
            Write 3 LinkedIn post options. Inputs are in workspace/${{ needs.scan.outputs.today }}/.
            Follow .claude/skills/write-posts/SKILL.md → produces posts.md + posts.json

            TODAY=${{ needs.scan.outputs.today }}
            DRY_RUN=${{ needs.scan.outputs.dry_run }}

            Use brief.md (primary), research.md, brain.md, themes.json, scored.json as source material.
            brief.md is the synthesized briefing — posts should draw from its insights and framing, not from raw research.
            Do NOT rewrite the briefing.
            Do NOT run council or publish.
          settings: .claude/settings.json
          anthropic_api_key: ${{ secrets.ATLAN_LLM_KEY }}
          max_turns: 30
          timeout_minutes: 10
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ATLAN_LLM_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          ANTHROPIC_MODEL: claude-opus-4-7
          ANTHROPIC_SMALL_FAST_MODEL: claude-sonnet-4-6
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
          TODAY: ${{ needs.scan.outputs.today }}
          DRY_RUN: ${{ needs.scan.outputs.dry_run }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workspace-posts-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
          retention-days: 14

  # ============================================================
  # JOB 5: SHIP — council + publish
  # Waits for both write-brief and write-posts. Handles quiet-day too.
  # ============================================================
  ship:
    name: Ship (council + publish)
    needs: [scan, analyze, write-brief, write-posts]
    if: always() && needs.scan.result == 'success' && needs.analyze.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
      SUPABASE_URL: https://xbatqlzrtijdmicoakaq.supabase.co
      GITHUB_REPO: Aayushm24/presidential-briefing
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: sudo apt-get install -y -qq jq curl python3

      - name: Configure Git identity
        run: |
          git config user.name "presidential-briefing-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Download scan artifact (base layer)
        uses: actions/download-artifact@v4
        with:
          name: workspace-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
        continue-on-error: true

      - name: Download brief artifact (overwrites base)
        if: needs.analyze.outputs.quiet_day != 'true'
        uses: actions/download-artifact@v4
        with:
          name: workspace-brief-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
        continue-on-error: true

      - name: Download posts artifact (overwrites base)
        if: needs.analyze.outputs.quiet_day != 'true'
        uses: actions/download-artifact@v4
        with:
          name: workspace-posts-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
        continue-on-error: true

      - name: Quiet-day fast path
        if: needs.analyze.outputs.quiet_day == 'true'
        env:
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          DRY_RUN: ${{ needs.scan.outputs.dry_run }}
        run: |
          TODAY=${{ needs.scan.outputs.today }}
          if [ "${DRY_RUN}" == "1" ]; then
            echo "[DRY_RUN] would POST nothing_new for $TODAY"
          elif [ -n "$N8N_SLACK_WEBHOOK_URL" ]; then
            curl -sS -X POST "$N8N_SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"type":"nothing_new"}'
            echo "quiet-day Slack delivered"
          fi
          mkdir -p workspace/$TODAY
          echo "quiet_day" > workspace/$TODAY/.status

      - name: Run council + revise via Claude Code
        if: needs.analyze.outputs.quiet_day != 'true'
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          prompt: |
            Run council review and revise. brief.md + posts.md + posts.json
            already exist in workspace/${{ needs.scan.outputs.today }}/.

            1. Follow .claude/skills/council/attack/SKILL.md — writes council-notes.md
            2. Run: python3 scripts/clean_text.py workspace/${{ needs.scan.outputs.today }}/brief.md workspace/${{ needs.scan.outputs.today }}/posts.md
            3. If council verdict is REVISE: follow .claude/skills/council/revise/SKILL.md (up to 2 iterations)
            4. After each revise, re-run: python3 scripts/clean_text.py workspace/${{ needs.scan.outputs.today }}/brief.md workspace/${{ needs.scan.outputs.today }}/posts.md

            DO NOT run gate scripts yourself — a separate bash step does that.
            DO NOT write .status — the bash gate step does that.
            Your job: council review + clean_text only.

            TODAY=${{ needs.scan.outputs.today }}
            Council MUST run real LLM passes. Never mock.
          settings: .claude/settings.json
          anthropic_api_key: ${{ secrets.ATLAN_LLM_KEY }}
          max_turns: 50
          timeout_minutes: 13
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ATLAN_LLM_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ANTHROPIC_SMALL_FAST_MODEL: claude-sonnet-4-6
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          LLM_PROXY_BASE_URL: https://llmproxy.atlan.dev
          TODAY: ${{ needs.scan.outputs.today }}
          DRY_RUN: ${{ needs.scan.outputs.dry_run }}

      # ── SYSTEMIC FIX: gates run in pure bash, NOT inside Claude Code ──
      # Claude Code cannot reliably exit 1 on its own gate failures.
      # This step is the single source of truth for whether content ships.
      - name: Quality gates (bash — deterministic, not LLM)
        if: needs.analyze.outputs.quiet_day != 'true'
        env:
          DATE: ${{ needs.scan.outputs.today }}
        run: |
          set -euo pipefail
          WS="workspace/${DATE}"
          FAIL=0

          echo "=== Running quality gates ==="

          # Final clean pass (belt-and-braces after council revise)
          python3 scripts/clean_text.py "${WS}/brief.md" "${WS}/posts.md" 2>&1 || true

          ./tests/kill-list-regex.sh "${WS}/brief.md" || { echo "::error::brief kill-list FAIL"; FAIL=1; }
          ./tests/kill-list-regex.sh "${WS}/posts.md"  || { echo "::error::posts kill-list FAIL"; FAIL=1; }
          ./tests/golden-format.sh   "${WS}/brief.md"  || { echo "::error::golden-format FAIL"; FAIL=1; }
          ./tests/posts-gate.sh      "${WS}/posts.json" || { echo "::error::posts-gate FAIL"; FAIL=1; }

          if [ $FAIL -eq 1 ]; then
            echo "::error::One or more quality gates failed. Content will not ship."
            echo "rejected-gates" > "${WS}/.status"
            exit 1
          fi

          echo "gates-ok" > "${WS}/.status"
          echo "=== All quality gates passed ==="

      - name: Deliver (commit + Readwise + Slack)
        if: needs.analyze.outputs.quiet_day != 'true'
        env:
          DATE: ${{ needs.scan.outputs.today }}
          DRY_RUN: ${{ needs.scan.outputs.dry_run }}
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          GITHUB_REPO: Aayushm24/presidential-briefing
        run: |
          set -euo pipefail
          WS="workspace/${DATE}"

          for f in "${WS}/brief.md" "${WS}/posts.md" "${WS}/posts.json"; do
            if [ ! -f "$f" ]; then
              echo "::error::missing required artifact: $f"
              exit 1
            fi
          done

          python3 scripts/clean_text.py "${WS}/brief.md" "${WS}/posts.md" 2>&1 || true

          ./tests/kill-list-regex.sh "${WS}/brief.md" || { echo "::error::brief kill-list fail"; exit 1; }
          ./tests/kill-list-regex.sh "${WS}/posts.md" || { echo "::error::posts kill-list fail"; exit 1; }
          ./tests/golden-format.sh "${WS}/brief.md" || { echo "::error::golden-format fail"; exit 1; }
          ./tests/posts-gate.sh "${WS}/posts.json" || { echo "::error::posts-gate fail"; exit 1; }
          echo "pre-delivery gates: all clean"

          LEAD_TITLE=$(head -1 "${WS}/brief.md" | sed 's/^# //' | head -c 200)

          if [ "$DRY_RUN" == "1" ]; then
            echo "[DRY_RUN] would commit ${WS}/brief.md + posts.md + scan-summary.json to main"
          else
            git add "${WS}/brief.md" "${WS}/posts.md" "${WS}/posts.json" 2>/dev/null || true
            [ -f "${WS}/council-notes.md" ] && git add "${WS}/council-notes.md"
            [ -f "${WS}/scan-summary.json" ] && git add "${WS}/scan-summary.json"
            [ -f history/published.jsonl ] && git add history/published.jsonl
            git commit -m "daily brief: ${DATE} — ${LEAD_TITLE}"
            git push origin main
            echo "committed to main"
          fi

          GITHUB_BRIEF_URL="https://github.com/${GITHUB_REPO}/blob/main/${WS}/brief.md"
          if [ "$DRY_RUN" == "1" ]; then
            echo "[DRY_RUN] would save to Readwise: ${GITHUB_BRIEF_URL}"
          else
            python3 scripts/send_readwise.py "${WS}/brief.md" "${GITHUB_BRIEF_URL}"
          fi

          POSTS_URL="https://github.com/${GITHUB_REPO}/blob/main/${WS}/posts.md"
          BRIEF_URL="https://github.com/${GITHUB_REPO}/blob/main/${WS}/brief.md"
          POSTS_JSON=$(jq -c '[.options[] | .post]' "${WS}/posts.json")

          if [ -f "${WS}/scan-summary.json" ]; then
            SCAN_HEALTH=$(jq -c '{status:.status,rss_items:.rss.items_returned,rss_feeds_ok:.rss.feeds_processed,rss_feeds_total:.rss.feeds_total,rss_feeds_failed:.rss.feeds_failed,sitemap_items:(.sitemap.items_total//0),x_posts:.x.posts_within_24h,degraded_reasons:.degraded_reasons}' "${WS}/scan-summary.json")
          else
            SCAN_HEALTH='{"status":"unknown"}'
          fi

          PAYLOAD=$(jq -n \
            --arg title "$LEAD_TITLE" \
            --arg brief_url "$BRIEF_URL" \
            --arg posts_url "$POSTS_URL" \
            --argjson posts "$POSTS_JSON" \
            --argjson scan_health "$SCAN_HEALTH" \
            '{type:"daily_brief",title:$title,briefing_url:$brief_url,posts_url:$posts_url,posts:$posts,scan_health:$scan_health}')

          if [ "$DRY_RUN" == "1" ]; then
            echo "[DRY_RUN] Slack payload: $(echo "$PAYLOAD" | jq -c .)"
          else
            HTTP=$(curl -sS -o /tmp/slack-resp.txt -w "%{http_code}" \
              -X POST "${N8N_SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" -d "$PAYLOAD")
            echo "n8n HTTP $HTTP"
            cat /tmp/slack-resp.txt
            [ "$HTTP" == "200" ] || echo "::warning::n8n returned $HTTP (non-fatal)"
          fi

          if [ "$DRY_RUN" != "1" ]; then
            mkdir -p history && touch history/published.jsonl
            jq -n --arg date "$DATE" --arg title "$LEAD_TITLE" \
              '{date:$date,lead_title:$title,status:"shipped"}' >> history/published.jsonl
            git add history/published.jsonl
            git commit -m "history: shipped ${DATE}" --allow-empty || true
            git push origin main
          fi
          echo "shipped" > "${WS}/.status"
          echo "DELIVERY COMPLETE"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workspace-${{ needs.scan.outputs.today }}
          path: workspace/${{ needs.scan.outputs.today }}/
          retention-days: 14
          overwrite: true
