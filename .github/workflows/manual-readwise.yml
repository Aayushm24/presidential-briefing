name: Manual Readwise Save

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD of the brief to save to Readwise Reader'
        required: true

permissions:
  contents: read

jobs:
  save:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: python3 -m pip install --break-system-packages --quiet markdown

      - name: Save brief to Readwise Reader
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          FILE="workspace/${DATE}/brief.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::$FILE does not exist on main. Check the date input."
            exit 1
          fi
          URL="https://github.com/${{ github.repository }}/blob/main/${FILE}"
          echo "Saving $FILE → Readwise Reader"
          python3 scripts/send_readwise.py "$FILE" "$URL"
