name: verify-secrets

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
        run: |
          set +e
          FAIL=0

          echo "## Secret Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Length |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          report() {
            local name="$1"
            local val="$2"
            local len=${#val}
            if [ -z "$val" ]; then
              echo "| $name | MISSING | 0 |" >> $GITHUB_STEP_SUMMARY
              echo "::error::$name is MISSING or empty"
              FAIL=1
            else
              echo "| $name | SET | $len |" >> $GITHUB_STEP_SUMMARY
              echo "::notice::$name is set (length=$len)"
            fi
          }

          for s in ATLAN_LLM_KEY SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_KEY \
                   N8N_SLACK_WEBHOOK_URL SLACK_DM_USER_ID READWISE_TOKEN; do
            report "$s" "${!s}"
          done

          if [ "$FAIL" = "1" ]; then
            echo "::warning::One or more secrets are missing."
          fi

      - name: Smoke-test n8n Slack webhook
        if: env.N8N_SLACK_WEBHOOK_URL != ''
        env:
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
        run: |
          code=$(curl -s -o /tmp/n8n.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"type":"nothing_new","_verify":true}' \
            "$N8N_SLACK_WEBHOOK_URL")
          if [ "$code" = "200" ]; then
            echo "::notice::n8n Slack webhook reachable — HTTP 200"
          else
            body=$(cat /tmp/n8n.json | head -c 300)
            echo "::error::n8n webhook failed — HTTP $code, body: $body"
          fi

      - name: Smoke-test Supabase URL + anon key
        if: env.SUPABASE_URL != '' && env.SUPABASE_ANON_KEY != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /tmp/sb.json -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/brain_pages?select=id&limit=1")
          body=$(cat /tmp/sb.json | head -c 300)
          if [ "$code" = "200" ]; then
            echo "::notice::Supabase reachable, anon key accepted — HTTP 200, body: $body"
          else
            echo "::error::Supabase unexpected response — HTTP $code, body: $body"
          fi

      - name: Smoke-test Readwise Reader API token
        if: env.READWISE_TOKEN != ''
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
        run: |
          # Auth check only — use the GET /api/v2/auth/ endpoint so we don't
          # create a throwaway document. Returns 204 if token valid.
          code=$(curl -s -o /tmp/rw.json -w "%{http_code}" \
            -H "Authorization: Token $READWISE_TOKEN" \
            "https://readwise.io/api/v2/auth/")
          if [ "$code" = "204" ] || [ "$code" = "200" ]; then
            echo "::notice::Readwise token valid — HTTP $code"
          else
            body=$(cat /tmp/rw.json | head -c 300)
            echo "::error::Readwise token check failed — HTTP $code, body: $body"
            exit 1
          fi
