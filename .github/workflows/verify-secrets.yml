name: verify-secrets

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
          READWISE_EMAIL: ${{ secrets.READWISE_EMAIL }}
          GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          set +e
          FAIL=0
          check() {
            local name="$1"
            local val="$2"
            local len=${#val}
            if [ -z "$val" ]; then
              echo "::error::$name is MISSING or empty"
              FAIL=1
            else
              echo "::notice::$name is set (length=$len)"
            fi
          }

          echo "## Secret Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Length |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          report() {
            local name="$1"
            local val="$2"
            local len=${#val}
            if [ -z "$val" ]; then
              echo "| $name | MISSING | 0 |" >> $GITHUB_STEP_SUMMARY
              FAIL=1
            else
              echo "| $name | SET | $len |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          for s in ATLAN_LLM_KEY SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_KEY \
                   SLACK_BOT_TOKEN SLACK_DM_USER_ID READWISE_EMAIL \
                   GMAIL_FROM_ADDRESS GMAIL_APP_PASSWORD; do
            report "$s" "${!s}"
          done

          echo ""
          echo "See job summary for results."
          if [ "$FAIL" = "1" ]; then
            echo "::warning::One or more secrets are missing. Fill them at Settings → Secrets and variables → Actions."
          fi

      - name: Smoke-test Slack bot token
        if: env.SLACK_BOT_TOKEN != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/slack.json -w "%{http_code}" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            https://slack.com/api/auth.test)
          ok=$(python3 -c "import json; print(json.load(open('/tmp/slack.json')).get('ok'))")
          if [ "$ok" = "True" ]; then
            team=$(python3 -c "import json; print(json.load(open('/tmp/slack.json')).get('team'))")
            bot=$(python3 -c "import json; print(json.load(open('/tmp/slack.json')).get('user'))")
            echo "::notice::Slack token valid — team=$team, bot=$bot"
          else
            err=$(python3 -c "import json; print(json.load(open('/tmp/slack.json')).get('error'))")
            echo "::error::Slack token invalid — $err"
          fi

      - name: Smoke-test Supabase URL + anon key
        if: env.SUPABASE_URL != '' && env.SUPABASE_ANON_KEY != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/")
          if [ "$code" = "200" ]; then
            echo "::notice::Supabase reachable, anon key accepted (HTTP 200)"
          else
            echo "::error::Supabase check failed — HTTP $code"
          fi

      - name: Smoke-test Gmail SMTP
        if: env.GMAIL_APP_PASSWORD != '' && env.GMAIL_FROM_ADDRESS != ''
        env:
          GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 <<'PY'
          import os, smtplib, sys
          user = os.environ["GMAIL_FROM_ADDRESS"]
          pw   = os.environ["GMAIL_APP_PASSWORD"]
          try:
              s = smtplib.SMTP("smtp.gmail.com", 587, timeout=10)
              s.starttls()
              s.login(user, pw)
              s.quit()
              print(f"::notice::Gmail SMTP login OK for {user}")
          except Exception as e:
              print(f"::error::Gmail SMTP login failed — {type(e).__name__}: {e}")
              sys.exit(1)
          PY
