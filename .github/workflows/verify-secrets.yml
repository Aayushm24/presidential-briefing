name: verify-secrets

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          ATLAN_LLM_KEY: ${{ secrets.ATLAN_LLM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
          READWISE_EMAIL: ${{ secrets.READWISE_EMAIL }}
          GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          set +e
          FAIL=0
          check() {
            local name="$1"
            local val="$2"
            local len=${#val}
            if [ -z "$val" ]; then
              echo "::error::$name is MISSING or empty"
              FAIL=1
            else
              echo "::notice::$name is set (length=$len)"
            fi
          }

          echo "## Secret Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Length |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          report() {
            local name="$1"
            local val="$2"
            local len=${#val}
            if [ -z "$val" ]; then
              echo "| $name | MISSING | 0 |" >> $GITHUB_STEP_SUMMARY
              FAIL=1
            else
              echo "| $name | SET | $len |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          for s in ATLAN_LLM_KEY SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_KEY \
                   N8N_SLACK_WEBHOOK_URL SLACK_DM_USER_ID READWISE_EMAIL \
                   GMAIL_FROM_ADDRESS GMAIL_APP_PASSWORD; do
            report "$s" "${!s}"
          done

          echo ""
          echo "See job summary for results."
          if [ "$FAIL" = "1" ]; then
            echo "::warning::One or more secrets are missing. Fill them at Settings → Secrets and variables → Actions."
          fi

      - name: Smoke-test n8n Slack webhook
        if: env.N8N_SLACK_WEBHOOK_URL != ''
        env:
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
        run: |
          if ! echo "$N8N_SLACK_WEBHOOK_URL" | grep -qE '^https://atlanhq\.app\.n8n\.cloud/webhook/'; then
            echo "::warning::N8N_SLACK_WEBHOOK_URL does not look like an n8n webhook URL"
          fi
          code=$(curl -s -o /tmp/n8n.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"type":"nothing_new","_verify":true}' \
            "$N8N_SLACK_WEBHOOK_URL")
          if [ "$code" = "200" ]; then
            echo "::notice::n8n Slack webhook reachable — HTTP 200 (a verification DM was sent to Slack)"
          else
            body=$(cat /tmp/n8n.json | head -c 300)
            echo "::error::n8n webhook failed — HTTP $code, body: $body"
          fi

      - name: Smoke-test Supabase URL + anon key
        if: env.SUPABASE_URL != '' && env.SUPABASE_ANON_KEY != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /tmp/sb.json -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/brain_pages?select=id&limit=1")
          body=$(cat /tmp/sb.json | head -c 300)
          if [ "$code" = "200" ]; then
            echo "::notice::Supabase reachable, anon key accepted — HTTP 200, body: $body"
          elif [ "$code" = "401" ]; then
            echo "::error::Supabase anon key rejected — HTTP 401, body: $body"
          elif [ "$code" = "404" ]; then
            echo "::warning::Supabase reachable but brain_pages table not found — HTTP 404, body: $body"
          else
            echo "::error::Supabase unexpected response — HTTP $code, body: $body"
          fi

      - name: Smoke-test Gmail SMTP
        if: env.GMAIL_APP_PASSWORD != '' && env.GMAIL_FROM_ADDRESS != ''
        env:
          GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 <<'PY'
          import os, smtplib, sys
          user = os.environ["GMAIL_FROM_ADDRESS"]
          pw   = os.environ["GMAIL_APP_PASSWORD"]
          try:
              s = smtplib.SMTP("smtp.gmail.com", 587, timeout=10)
              s.starttls()
              s.login(user, pw)
              s.quit()
              print(f"::notice::Gmail SMTP login OK for {user}")
          except Exception as e:
              print(f"::error::Gmail SMTP login failed — {type(e).__name__}: {e}")
              sys.exit(1)
          PY
