name: Dead-man monitor

on:
  schedule:
    # Three fallback windows. GitHub cron is best-effort and routinely runs
    # 1-3 hours late. Daily-brief's ship step has historically run as late
    # as 06:07 UTC (4-5h after expected 02:30 UTC start), so the third cron
    # at 08:30 UTC catches the case where ship completed between the second
    # check and now. Dead-man is idempotent (no-op if today shipped).
    - cron: '30 1 * * *'   # 7:00 AM IST â€” primary check
    - cron: '0 4 * * *'    # 9:30 AM IST â€” backstop for late scheduled runs
    - cron: '30 8 * * *'   # 2:00 PM IST â€” catches late-ship completions
  workflow_dispatch:

permissions:
  contents: read
  actions: write   # needed for gh run rerun

jobs:
  check-and-retry:
    name: Check if today shipped, retry if not
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TZ: Asia/Kolkata
      REPO: Aayushm24/presidential-briefing
      N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check shipped status and retry if needed
        run: |
          set -uo pipefail
          TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          echo "Checking delivery status for $TODAY..."

          # Slack helper â€” fire and forget. Takes: type, action, details.
          slack_alert() {
            local alert_type="$1"
            local action="$2"
            local details="$3"
            [ -z "${N8N_SLACK_WEBHOOK_URL:-}" ] && { echo "(no webhook â€” alert skipped)"; return 0; }
            PAYLOAD=$(jq -n \
              --arg date "$TODAY" \
              --arg type "$alert_type" \
              --arg action "$action" \
              --arg details "$details" \
              '{type:"deadman_alert",alert:$type,date:$date,action:$action,details:$details}')
            curl -sS -X POST "$N8N_SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" -d "$PAYLOAD" \
              -o /tmp/slack.txt -w "slack HTTP %{http_code}\n" || true
            cat /tmp/slack.txt 2>/dev/null || true
            echo ""
          }

          # 1. Check git for .status file
          GIT_STATUS=$(cat "workspace/$TODAY/.status" 2>/dev/null || echo "missing")
          echo "Git .status: $GIT_STATUS"

          if [ "$GIT_STATUS" = "shipped" ]; then
            echo "âś“ $TODAY already shipped. Nothing to do."
            exit 0
          fi

          # 2. Find today's daily-brief run via GitHub API
          UTC_DATE=$(date -u +%Y-%m-%d)
          IST_DATE=$TODAY

          RUN_JSON=$(gh run list \
            --workflow=daily-brief.yml \
            --repo "$REPO" \
            --limit 10 \
            --json databaseId,conclusion,status,createdAt \
            2>/dev/null || echo "[]")

          RUN_ID=$(echo "$RUN_JSON" | jq -r "
            [.[] | select(
              (.createdAt | startswith(\"${UTC_DATE}\")) or
              (.createdAt | startswith(\"${IST_DATE}\"))
            )] | sort_by(.createdAt) | last | .databaseId // empty
          ")

          CONCLUSION=$(echo "$RUN_JSON" | jq -r "
            [.[] | select(
              (.createdAt | startswith(\"${UTC_DATE}\")) or
              (.createdAt | startswith(\"${IST_DATE}\"))
            )] | sort_by(.createdAt) | last | .conclusion // empty
          ")

          RUN_STATUS=$(echo "$RUN_JSON" | jq -r "
            [.[] | select(
              (.createdAt | startswith(\"${UTC_DATE}\")) or
              (.createdAt | startswith(\"${IST_DATE}\"))
            )] | sort_by(.createdAt) | last | .status // empty
          ")

          echo "Run ID: ${RUN_ID:-none} | Conclusion: ${CONCLUSION:-none} | Status: ${RUN_STATUS:-none}"

          # 3. Act on run state

          RUN_URL=""
          [ -n "$RUN_ID" ] && RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          if [ -z "$RUN_ID" ]; then
            echo "âš ď¸Ź  No daily-brief run found for $TODAY. Triggering fresh pipeline..."
            if gh workflow run daily-brief.yml --repo "$REPO"; then
              slack_alert "no_run_found" "triggered_fresh_pipeline" "No daily-brief run existed for today. Triggered a fresh pipeline. ETA ~25 min."
            else
              slack_alert "no_run_found" "failed_to_trigger" "No daily-brief run existed for today and triggering a fresh one FAILED. Manual intervention needed."
              exit 1
            fi
            echo "Fresh pipeline triggered. Will complete in ~25 min."
            exit 0
          fi

          if [ "$RUN_STATUS" = "in_progress" ] || [ "$RUN_STATUS" = "queued" ]; then
            echo "Pipeline still running (status=$RUN_STATUS). Leaving it alone."
            exit 0
          fi

          if [ "$CONCLUSION" = "success" ]; then
            # Pipeline reports success but .status missing in git.
            # Could be dry run, redeliver pending, or silent content-quality fail.
            # Flag it so a human looks â€” don't silently assume it's fine.
            slack_alert "success_no_status" "manual_check" "Pipeline succeeded for $TODAY but workspace/$TODAY/.status is missing in git (expected 'shipped'). Run: $RUN_URL. Check whether it was a dry run or whether redelivery is needed."
            exit 0
          fi

          if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "timed_out" ]; then
            echo "âš ď¸Ź  Pipeline $CONCLUSION (run=$RUN_ID). Re-running failed jobs only..."
            if gh run rerun "$RUN_ID" --repo "$REPO" --failed; then
              slack_alert "pipeline_failure" "rerun_failed_jobs" "Daily brief $CONCLUSION overnight (run=$RUN_ID). Re-running failed jobs. If this rerun also fails, tomorrow's dead-man will alert again. Run: $RUN_URL"
            else
              slack_alert "pipeline_failure" "rerun_failed_to_trigger" "Daily brief $CONCLUSION overnight (run=$RUN_ID) and dead-man could NOT trigger a rerun. Manual intervention needed. Run: $RUN_URL"
              exit 1
            fi
            echo "âś“ Re-run triggered. Artifacts from successful jobs reused."
            echo "  Expected completion: ~15 min."
            exit 0
          fi

          # Unhandled state â€” still tell the human.
          slack_alert "unknown_state" "no_action" "Dead-man found unexpected state: conclusion=$CONCLUSION status=$RUN_STATUS. Run: $RUN_URL"
          echo "State: conclusion=$CONCLUSION status=$RUN_STATUS â€” no action."

      # ==========================================================
      # Secondary check â€” linkedin-performance cron staleness.
      # Runs every day after the main daily-brief check. Only alerts
      # on the mornings AFTER an expected run (Tue/Sat IST), and only
      # if the most recent successful scheduled run is stale.
      # ==========================================================
      - name: Check linkedin-performance cron didn't silently skip
        run: |
          set -uo pipefail
          TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          DOW=$(TZ=Asia/Kolkata date +%u)  # 1=Mon ... 7=Sun
          # linkedin-performance cron is Mon(1) + Fri(5) @ 23:00 IST.
          # Check on Tue(2) + Sat(6) mornings (the day AFTER).
          if [ "$DOW" != "2" ] && [ "$DOW" != "6" ]; then
            echo "DOW=$DOW â€” not a check day for linkedin-performance. Skipping."
            exit 0
          fi
          echo "DOW=$DOW â†’ checking linkedin-performance freshness"

          # Slack helper â€” reuse the one defined in the previous step by
          # inlining it (step env is isolated, so redefine).
          slack_alert() {
            local alert_type="$1"
            local action="$2"
            local details="$3"
            [ -z "${N8N_SLACK_WEBHOOK_URL:-}" ] && { echo "(no webhook â€” alert skipped)"; return 0; }
            PAYLOAD=$(jq -n \
              --arg date "$TODAY" \
              --arg type "$alert_type" \
              --arg action "$action" \
              --arg details "$details" \
              '{type:"deadman_alert",alert:$type,date:$date,action:$action,details:$details}')
            curl -sS -X POST "$N8N_SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" -d "$PAYLOAD" \
              -o /tmp/slack.txt -w "slack HTTP %{http_code}\n" || true
            cat /tmp/slack.txt 2>/dev/null || true
            echo ""
          }

          # Find the most recent SCHEDULED successful linkedin-performance run.
          PERF_JSON=$(gh run list \
            --workflow=linkedin-performance.yml \
            --repo "$REPO" \
            --event schedule \
            --status success \
            --limit 5 \
            --json databaseId,createdAt \
            2>/dev/null || echo "[]")

          LAST_OK=$(echo "$PERF_JSON" | jq -r '.[0].createdAt // empty')
          LAST_ID=$(echo "$PERF_JSON" | jq -r '.[0].databaseId // empty')

          if [ -z "$LAST_OK" ]; then
            slack_alert "perf_missing" "manual_check" "No successful scheduled linkedin-performance run found in the last 5 attempts. Check https://github.com/${REPO}/actions/workflows/linkedin-performance.yml"
            exit 0
          fi

          # Compute days-since in portable bash (macOS and GNU coreutils differ).
          LAST_EPOCH=$(python3 -c "from datetime import datetime; d=datetime.fromisoformat('${LAST_OK}'.replace('Z','+00:00')); print(int(d.timestamp()))")
          NOW_EPOCH=$(date -u +%s)
          DAYS_SINCE=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))
          echo "linkedin-performance last successful scheduled run: $LAST_OK (${DAYS_SINCE} days ago, run=${LAST_ID})"

          # Freshness threshold: cron is every Mon+Fri (3-4 day gap). >4 days = missed.
          if [ "$DAYS_SINCE" -gt 4 ]; then
            RUN_URL="https://github.com/${REPO}/actions/runs/${LAST_ID}"
            echo "âš ď¸Ź  stale: ${DAYS_SINCE} days since last run. Triggering manual run..."
            if gh workflow run linkedin-performance.yml --repo "$REPO"; then
              slack_alert "perf_stale" "triggered_manual" "linkedin-performance cron didn't fire as expected â€” last success was ${DAYS_SINCE} days ago (${LAST_OK}). Triggered a manual run to catch up. Last successful run: ${RUN_URL}"
            else
              slack_alert "perf_stale" "manual_trigger_failed" "linkedin-performance is ${DAYS_SINCE} days stale AND manual trigger failed. Check Apify token + workflow file. Last success: ${RUN_URL}"
              exit 1
            fi
          else
            echo "âś“ linkedin-performance is fresh (${DAYS_SINCE} days since last run)"
          fi
