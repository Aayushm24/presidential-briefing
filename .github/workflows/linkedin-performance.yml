name: LinkedIn Performance

on:
  schedule:
    # 11:00 PM IST = 17:30 UTC — Mondays + Fridays only.
    # Logic: Mon catches weekend engagement settling on prior posts; Fri catches
    # mid-week post performance before weekend drop. Each post gets ~2 snapshots
    # over its 2-week engagement lifecycle. Cost ~$4/mo vs $15/mo if daily.
    - cron: '30 17 * * 1,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without committing'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: linkedin-performance
  cancel-in-progress: false

jobs:
  snapshot:
    name: Snapshot LinkedIn posts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TZ: Asia/Kolkata
      LINKEDIN_PROFILE_URL: https://www.linkedin.com/in/aayush-maheshwari/
      # Engagement on posts older than ~2 weeks barely moves. 5 covers the active window.
      # Older posts already saved under performance-data/ stay untouched; rebuild still reads all of them.
      MAX_POSTS: '5'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "presidential-briefing-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Install deps
        run: |
          python3 -m pip install --quiet requests

      - name: Set TODAY
        id: today
        run: echo "today=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Snapshot posts
        id: snapshot
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          # Tee stderr to a file so the notify step can parse the stats line.
          python3 scripts/linkedin_performance.py $DRY_FLAG 2> >(tee /tmp/perf-stats.log >&2)
          # Surface the stats line as a step output.
          STATS=$(grep -oE 'posts_fetched=[0-9]+ files_created=[0-9]+ files_updated=[0-9]+[^"]*' /tmp/perf-stats.log | tail -1)
          echo "stats=${STATS}" >> $GITHUB_OUTPUT

      - name: Attribute published posts to generated options
        if: github.event.inputs.dry_run != 'true'
        run: python3 scripts/match_published_to_options.py

      - name: Rebuild patterns from merged history
        if: github.event.inputs.dry_run != 'true'
        run: python3 scripts/rebuild_linkedin_history.py

      - name: Path allowlist enforcement
        if: github.event.inputs.dry_run != 'true'
        run: |
          DIFF_FILES=$(git status --porcelain | awk '{print $2}')
          FAILED=0
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            case "$FILE" in
              performance-data/*) ;;
              history/linkedin-posts-history.jsonl) ;;
              history/option-pickups.jsonl) ;;
              config/linkedin-patterns.json) ;;
              config/aayush-linkedin-patterns.md) ;;
              *)
                echo "::error::Path allowlist violation: $FILE"
                FAILED=1
                ;;
            esac
          done <<< "$DIFF_FILES"
          if [ $FAILED -eq 1 ]; then
            echo "::error::Unauthorized files modified — aborting"
            git checkout -- .
            exit 1
          fi

      - name: Commit and push
        id: commit
        if: github.event.inputs.dry_run != 'true'
        run: |
          TODAY=${{ steps.today.outputs.today }}
          if [ -z "$(git status --porcelain)" ]; then
            echo "no changes to commit"
            echo "committed=0" >> $GITHUB_OUTPUT
            echo "files_changed=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          COUNT=$(git status --porcelain performance-data/ | wc -l | tr -d ' ')
          git add performance-data/ history/linkedin-posts-history.jsonl history/option-pickups.jsonl config/linkedin-patterns.json config/aayush-linkedin-patterns.md
          git commit -m "perf: snapshot $TODAY ($COUNT posts) + attributions + rebuilt patterns"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "committed=1" >> $GITHUB_OUTPUT
          echo "files_changed=${COUNT}" >> $GITHUB_OUTPUT

      - name: Notify Slack on success
        if: github.event.inputs.dry_run != 'true'
        env:
          N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
          DATE: ${{ steps.today.outputs.today }}
          STATS: ${{ steps.snapshot.outputs.stats }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          FILES_CHANGED: ${{ steps.commit.outputs.files_changed }}
          RUN_ID: ${{ github.run_id }}
          REPO: Aayushm24/presidential-briefing
        run: |
          set -uo pipefail
          # Proper perf_snapshot route added to n8n on 2026-04-26.
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          MSG="LinkedIn engagement scrape ran. ${STATS:-stats unavailable}. files_committed=${FILES_CHANGED:-0}. Run: ${RUN_URL}"
          PAYLOAD=$(jq -n \
            --arg date "$DATE" \
            --arg msg "$MSG" \
            '{
              type: "perf_snapshot",
              date: $date,
              message: $msg
            }')
          if [ -n "${N8N_SLACK_WEBHOOK_URL:-}" ]; then
            HTTP=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
              -X POST "$N8N_SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" -d "$PAYLOAD" || echo "000")
            echo "perf-notify n8n HTTP $HTTP"
            cat /tmp/resp.txt 2>/dev/null || true
          else
            echo "::warning::N8N_SLACK_WEBHOOK_URL not set — success alert skipped"
          fi

  # ============================================================
  # notify-failure — fires if the snapshot job failed.
  # Uses the pipeline_failure route in n8n.
  # ============================================================
  notify-failure:
    name: Notify on failure
    needs: snapshot
    if: always() && needs.snapshot.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      TZ: Asia/Kolkata
      N8N_SLACK_WEBHOOK_URL: ${{ secrets.N8N_SLACK_WEBHOOK_URL }}
      REPO: Aayushm24/presidential-briefing
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Post failure alert to Slack
        run: |
          set -uo pipefail
          TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg date "$TODAY" \
            --arg run_url "$RUN_URL" \
            '{
              type: "pipeline_failure",
              date: $date,
              failed_jobs: "linkedin_performance_snapshot",
              run_url: $run_url,
              message: "LinkedIn engagement scrape (Apify) failed. Common causes: Apify token expired, rate limited, or actor A3cAPGpwBEG8RJwse output shape changed."
            }')
          if [ -n "${N8N_SLACK_WEBHOOK_URL:-}" ]; then
            HTTP=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
              -X POST "$N8N_SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" -d "$PAYLOAD" || echo "000")
            echo "perf-notify-failure n8n HTTP $HTTP"
            cat /tmp/resp.txt 2>/dev/null || true
          else
            echo "::warning::N8N_SLACK_WEBHOOK_URL not set — failure alert skipped"
          fi
